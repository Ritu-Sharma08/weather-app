<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weather App</title>
  <link rel="stylesheet" href="stylesheet.css" />
</head>
<body>

  <div class="container">
    <h1>Weather App</h1>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
